version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neuralbook-api
    ports:
      - "${NBOOK_PORT:-8000}:8000"
    environment:
      NBOOK_HOST: "0.0.0.0"
      NBOOK_PORT: "8000"
      NBOOK_DATA: "/data"
      NBOOK_API_KEYS: "${NBOOK_API_KEYS:-}"
      NBOOK_CORS_ORIGINS: "${NBOOK_CORS_ORIGINS:-*}"
      PYTHONUNBUFFERED: "1"
    volumes:
      - neuralbook_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - neuralbook

  dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neuralbook-dev
    command: /bin/bash
    stdin_open: true
    tty: true
    environment:
      NBOOK_DATA: "/data"
      PYTHONUNBUFFERED: "1"
    volumes:
      - .:/app
      - neuralbook_data:/data
    networks:
      - neuralbook
    profiles:
      - dev

volumes:
  neuralbook_data:
    driver: local

networks:
  neuralbook:
    driver: bridge
