name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (upload to TestPyPI)'
        required: true
        default: 'true'

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Run tests
        run: python -m pytest tests/ -v --cov --cov-report=xml
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine wheel
      
      - name: Build distributions
        run: python -m build
      
      - name: Validate package
        run: twine check dist/*
      
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: ${{ secrets.PYPI_REPOSITORY_URL || 'https://upload.pypi.org/legacy/' }}

  docker:
    needs: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Extract version
        id: meta
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAGS=neuralbook/neuralbook:$VERSION,neuralbook/neuralbook:latest" >> $GITHUB_OUTPUT
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: [publish, docker]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract version
        id: meta
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          name: "NeuralBook v${{ steps.meta.outputs.VERSION }}"
          body: |
            ## Release: NeuralBook v${{ steps.meta.outputs.VERSION }}
            
            📦 **Available on:**
            - PyPI: https://pypi.org/project/neuralbook/
            - Docker Hub: https://hub.docker.com/r/neuralbook/neuralbook
            - GitHub: https://github.com/neuralbook/neuralbook
            
            ### Installation
            
            **pip:**
            ```bash
            pip install neuralbook==${{ steps.meta.outputs.VERSION }}
            ```
            
            **Docker:**
            ```bash
            docker pull neuralbook/neuralbook:${{ steps.meta.outputs.VERSION }}
            ```
            
            **From source:**
            ```bash
            git clone https://github.com/neuralbook/neuralbook.git
            cd neuralbook && git checkout v${{ steps.meta.outputs.VERSION }}
            pip install -e .
            ```
